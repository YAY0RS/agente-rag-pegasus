services:
  agente_rag:
    build: .
    container_name: pegasus_agente
    working_dir: /proyecto
    volumes:
      - .:/proyecto
    env_file:
      - .env
    # Abrimos el puerto 8000 hacia tu computadora
    ports:
      - "8000:8000"
    # Iniciamos el servidor de FastAPI en lugar del script normal
    command: uvicorn app.consultar_db:app --host 0.0.0.0 --port 8000 --reload
